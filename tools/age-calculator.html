<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fb;
}
.container{
    max-width:400px;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}
h1{
    text-align:center;
    color:#2563eb;
}
label{
    font-weight:bold;
}
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🎂 Age Calculator</h1>

<label>Select Date of Birth</label>

<input type="date" id="dob">

<button onclick="calculateAge()">
Calculate Age
</button>

<div id="result"></div>

</div>

<script>
  function calculateAge(){

let dob=document.getElementById("dob").value;

if(dob==""){
document.getElementById("result").innerHTML="⚠️ Please select your Date of Birth";
return;
}

let birthDate=new Date(dob);
let today=new Date();

let years=today.getFullYear()-birthDate.getFullYear();
let months=today.getMonth()-birthDate.getMonth();
let days=today.getDate()-birthDate.getDate();

if(days<0){
months--;
let lastMonth=new Date(today.getFullYear(),today.getMonth(),0);
days+=lastMonth.getDate();
}

if(months<0){
years--;
months+=12;
}

document.getElementById("result").innerHTML=
`🎉 Your Age is <br><br>
<b>${years}</b> Years
<b>${months}</b> Months
<b>${days}</b> Days`;

}

</script>

</body>
</html>
