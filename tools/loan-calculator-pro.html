<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
background:#eef4ff;
padding:15px;
border-radius:10px;
display:none;
}

.result p{
margin:10px 0;
font-size:17px;
}
</style>

</head>

<body>

<div class="container">

<h1>🏦 Loan Calculator Pro</h1>

<div class="input-box">
<label>Loan Amount (₹)</label>
<input type="number" id="loan">
</div>

<div class="input-box">
<label>Interest Rate (%)</label>
<input type="number" id="rate">
</div>

<div class="input-box">
<label>Loan Tenure (Years)</label>
<input type="number" id="years">
</div>

<button onclick="calculateLoan()">
Calculate EMI
</button>

<div class="result" id="result">
  <script>
function calculateLoan(){

let P=parseFloat(document.getElementById("loan").value);
let R=parseFloat(document.getElementById("rate").value);
let Y=parseFloat(document.getElementById("years").value);

if(isNaN(P)||isNaN(R)||isNaN(Y)||P<=0||R<=0||Y<=0){
alert("Please enter valid values.");
return;
}

let monthlyRate=R/(12*100);
let months=Y*12;

let emi=(P*monthlyRate*Math.pow(1+monthlyRate,months))/
(Math.pow(1+monthlyRate,months)-1);

let totalPayment=emi*months;
let totalInterest=totalPayment-P;

document.getElementById("emi").innerHTML=emi.toFixed(2);

document.getElementById("interest").innerHTML=totalInterest.toFixed(2);

document.getElementById("total").innerHTML=totalPayment.toFixed(2);

document.getElementById("result").style.display="block";
}
</script>

</div>

</body>
</html>

<p><b>Monthly EMI :</b>
₹ <span id="emi"></span></p>

<p><b>Total Interest :</b>
₹ <span id="interest"></span></p>

<p><b>Total Payment :</b>
₹ <span id="total"></span></p>

</div>
