<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:20px;
color:#2563eb;
}

.input-box{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

#calcBtn{
background:#2563eb;
color:white;
}

#resetBtn{
background:#ef4444;
color:white;
}

.result{
display:none;
margin-top:20px;
background:#eef4ff;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🏦 Loan Calculator Pro</h1>

<div class="input-box">
<label>Loan Amount (₹)</label>
<input type="number" id="loan">
</div>

<div class="input-box">
<label>Interest Rate (%)</label>
<input type="number" id="rate">
</div>

<div class="input-box">
<label>Loan Tenure (Years)</label>
<input type="number" id="years">
</div>

<button id="calcBtn" onclick="calculateLoan()">Calculate EMI</button>

<button id="resetBtn" onclick="resetLoan()">Reset</button>

<div class="result" id="result">

<p><b>Monthly EMI:</b> ₹ <span id="emi"></span></p>
<p><b>Total Interest:</b> ₹ <span id="interest"></span></p>
<p><b>Total Payment:</b> ₹ <span id="total"></span></p>

<div style="height:300px;margin-top:20px;">
<canvas id="loanChart"></canvas>
</div>

<table id="schedule" border="1" width="100%" style="margin-top:20px;border-collapse:collapse;">
<thead>
<tr>
<th>Month</th>
<th>EMI</th>
<th>Interest</th>
<th>Principal</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="scheduleBody"></tbody>

</table>

</div>
<script>

let loanChart = null;

function calculateLoan(){

let P = parseFloat(document.getElementById("loan").value);
let R = parseFloat(document.getElementById("rate").value);
let Y = parseFloat(document.getElementById("years").value);

if(isNaN(P) || isNaN(R) || isNaN(Y) || P<=0 || R<=0 || Y<=0){
    alert("Please enter valid values.");
    return;
}

let monthlyRate = R / (12 * 100);
let months = Y * 12;

let emi = (P * monthlyRate * Math.pow(1 + monthlyRate, months)) /
          (Math.pow(1 + monthlyRate, months) - 1);

let totalPayment = emi * months;
let totalInterest = totalPayment - P;

document.getElementById("emi").textContent = emi.toFixed(2);
document.getElementById("interest").textContent = totalInterest.toFixed(2);
document.getElementById("total").textContent = totalPayment.toFixed(2);

document.getElementById("result").style.display = "block";

let balance = P;
let rows = "";

for(let i=1;i<=months;i++){

let interest = balance * monthlyRate;
let principal = emi - interest;

if(principal > balance){
    principal = balance;
}

balance -= principal;

rows += `
<tr>
<td>${i}</td>
<td>${emi.toFixed(2)}</td>
<td>${interest.toFixed(2)}</td>
<td>${principal.toFixed(2)}</td>
<td>${Math.max(balance,0).toFixed(2)}</td>
</tr>`;
}

document.getElementById("scheduleBody").innerHTML = rows;

if(loanChart){
    loanChart.destroy();
}

loanChart = new Chart(document.getElementById("loanChart"),{
    type:"pie",
    data:{
        labels:["Principal","Interest"],
        datasets:[{
            data:[P,totalInterest]
        }]
    }
});

}

function resetLoan(){

document.getElementById("loan").value="";
document.getElementById("rate").value="";
document.getElementById("years").value="";

document.getElementById("result").style.display="none";

document.getElementById("scheduleBody").innerHTML="";

if(loanChart){
    loanChart.destroy();
    loanChart=null;
}

}

</script>

</body>
</html>
