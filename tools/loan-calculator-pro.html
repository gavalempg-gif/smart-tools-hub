<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
background:#eef4ff;
padding:15px;
border-radius:10px;
display:none;
}

.result p{
margin:10px 0;
font-size:17px;
}
</style>

</head>

<body>

<div class="container">

<h1>🏦 Loan Calculator Pro</h1>

<div class="input-box">
<label>Loan Amount (₹)</label>
<input type="number" id="loan">
</div>

<div class="input-box">
<label>Interest Rate (%)</label>
<input type="number" id="rate">
</div>

<div class="input-box">
<label>Loan Tenure (Years)</label>
<input type="number" id="years">
</div>

<button onclick="calculateLoan()">
Calculate EMI
</button>

<button onclick="resetLoan()" style="background:#ef4444;margin-top:10px;">
Reset
</button>

<div class="result" id="result">
  
<table id="schedule" style="width:100%;margin-top:20px;border-collapse:collapse;display:none;">
<thead>
<tr style="background:#2563eb;color:white;">
<th>Month</th>
<th>EMI</th>
<th>Interest</th>
<th>Principal</th>
<th>Balance</th>
</tr>
</thead>
<tbody id="scheduleBody"></tbody>
</table>
<p><b>Monthly EMI :</b> ₹ <span id="emi"></span></p>

<p><b>Total Interest :</b> ₹ <span id="interest"></span></p>

<p><b>Total Payment :</b> ₹ <span id="total"></span></p>

</div>

<script>
  function calculateLoan(){

let P=parseFloat(document.getElementById("loan").value);
let R=parseFloat(document.getElementById("rate").value);
let Y=parseFloat(document.getElementById("years").value);
  if(isNaN(P)||isNaN(R)||isNaN(Y)||P<=0||R<=0||Y<=0){
alert("Please enter valid values.");
return;
}

let monthlyRate=R/(12*100);
let months=Y*12;

let emi=(P*monthlyRate*Math.pow(1+monthlyRate,months))/
(Math.pow(1+monthlyRate,months)-1);

let totalPayment=emi*months;
let totalInterest=totalPayment-P;
  document.getElementById("emi").innerHTML =
Number(emi.toFixed(2)).toLocaleString("en-IN");

document.getElementById("interest").innerHTML =
Number(totalInterest.toFixed(2)).toLocaleString("en-IN");

document.getElementById("total").innerHTML =
Number(totalPayment.toFixed(2)).toLocaleString("en-IN");

document.getElementById("result").style.display="block";
    
let balance=P;
let body="";

for(let i=1;i<=months;i++){

let interest=balance*monthlyRate;
let principal=emi-interest;

if(principal>balance){
principal=balance;
}

balance-=principal;

body+=`
<tr>
<td>${i}</td>
<td>₹${emi.toFixed(2)}</td>
<td>₹${interest.toFixed(2)}</td>
<td>₹${principal.toFixed(2)}</td>
<td>₹${Math.max(balance,0).toFixed(2)}</td>
</tr>`;
}

document.getElementById("scheduleBody").innerHTML=body;
document.getElementById("schedule").style.display="table";
let ctx = document.getElementById("loanChart").getContext("2d");

if (window.loanChart) {
    window.loanChart.destroy();
}

window.loanChart = new Chart(ctx, {
    type: "pie",
    data: {
        labels: ["Principal", "Interest"],
        datasets: [{
            data: [P, totalInterest],
            backgroundColor: ["#4CAF50", "#FF9800"]
        }]
    },
    options: {
        responsive: true
    }
});
}

function resetLoan(){

document.getElementById("loan").value="";
document.getElementById("rate").value="";
document.getElementById("years").value="";

document.getElementById("result").style.display="none";

}
</script>
  
<div style="margin-top:30px;">
    <canvas id="loanChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
