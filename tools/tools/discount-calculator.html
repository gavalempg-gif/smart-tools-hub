
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fc;
    margin:0;
    padding:0;
}
.container{
    max-width:400px;
    background:#fff;
    margin:40px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}
h2{
    text-align:center;
    color:#2563eb;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
.result{
    margin-top:20px;
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    font-size:18px;
}
a{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#2563eb;
}
</style>

</head>
<body>

<div class="container">

<h2>🏷️ Discount Calculator</h2>

<input type="number" id="price" placeholder="Original Price">

<input type="number" id="discount" placeholder="Discount %">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result">
Enter values and click Calculate
</div>

<a href="../index.html">⬅ Back to Home</a>

</div>

<script>
function calculate(){

let price=parseFloat(document.getElementById("price").value);
let discount=parseFloat(document.getElementById("discount").value);

if(isNaN(price)||isNaN(discount)){
document.getElementById("result").innerHTML="Please enter valid numbers.";
return;
}

let save=(price*discount)/100;
let finalPrice=price-save;

document.getElementById("result").innerHTML=
"💰 Original Price: ₹"+price.toFixed(2)+"<br><br>"+
"🎁 Discount: ₹"+save.toFixed(2)+"<br><br>"+
"✅ Final Price: ₹"+finalPrice.toFixed(2);

}
</script>

</body>
</html>
