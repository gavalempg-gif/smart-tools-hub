
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#2563eb;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>GST Calculator</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="gst">
<option value="3">3%</option>
<option value="5">5%</option>
<option value="12">12%</option>
<option value="18" selected>18%</option>
<option value="28">28%</option>
</select>

<button onclick="calculateGST()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateGST(){

let amount=parseFloat(document.getElementById("amount").value);

let gst=parseFloat(document.getElementById("gst").value);

if(isNaN(amount)){
document.getElementById("result").innerHTML="Please enter amount";
return;
}

let gstAmount=amount*gst/100;

let total=amount+gstAmount;

document.getElementById("result").innerHTML=
`
Amount : ₹ ${amount.toFixed(2)}<br><br>
GST : ₹ ${gstAmount.toFixed(2)}<br><br>
Total : ₹ ${total.toFixed(2)}
`;

}

</script>

</body>
</html>
