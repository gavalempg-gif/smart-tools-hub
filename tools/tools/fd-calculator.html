<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
padding:15px;
background:#f8fafc;
border-radius:8px;
font-size:18px;
font-weight:bold;
line-height:1.8;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>🏦 FD Calculator</h2>

<input type="number" id="principal" placeholder="Deposit Amount (₹)">

<input type="number" id="rate" placeholder="Interest Rate (%)">

<input type="number" id="years" placeholder="Time (Years)">

<button onclick="calculateFD()">Calculate FD</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateFD(){

let P=parseFloat(document.getElementById("principal").value);

let R=parseFloat(document.getElementById("rate").value);

let T=parseFloat(document.getElementById("years").value);

if(isNaN(P)||isNaN(R)||isNaN(T)){

document.getElementById("result").innerHTML="Please enter all values.";

return;

}

let maturity=P*Math.pow((1+R/100),T);

let interest=maturity-P;

document.getElementById("result").innerHTML=

`
💰 Deposit Amount<br>
₹ ${P.toFixed(2)}<br><br>

📈 Interest Earned<br>
₹ ${interest.toFixed(2)}<br><br>

🏆 Maturity Amount<br>
₹ ${maturity.toFixed(2)}
`;

}

</script>

</body>
</html>
