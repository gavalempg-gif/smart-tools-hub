
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
text-align:center;
font-size:18px;
font-weight:bold;
line-height:1.8;
}
</style>

</head>
<body>

<div class="container">

<h2>⚖ BMI Calculator</h2>

<input type="number" id="weight" placeholder="Weight (kg)">

<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calculateBMI()">Calculate BMI</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateBMI(){

let weight=parseFloat(document.getElementById("weight").value);

let height=parseFloat(document.getElementById("height").value);

if(isNaN(weight)||isNaN(height)||height<=0){

document.getElementById("result").innerHTML="Please enter valid values.";

return;

}

height=height/100;

let bmi=weight/(height*height);

let status="";

if(bmi<18.5)
status="Underweight";

else if(bmi<25)
status="Normal Weight";

else if(bmi<30)
status="Overweight";

else
status="Obese";

document.getElementById("result").innerHTML=
`
Your BMI<br><br>

${bmi.toFixed(2)}<br><br>

Status : ${status}
`;

}

</script>

</body>
</html>
