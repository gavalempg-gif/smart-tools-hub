<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
padding:15px;
background:#f8fafc;
border-radius:8px;
font-size:18px;
font-weight:bold;
text-align:center;
line-height:1.8;
}
</style>

</head>
<body>

<div class="container">

<h2>🏦 RD Calculator</h2>

<input type="number" id="monthly" placeholder="Monthly Deposit (₹)">

<input type="number" id="rate" placeholder="Interest Rate (%)">

<input type="number" id="years" placeholder="Time (Years)">

<button onclick="calculateRD()">Calculate RD</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateRD(){

let P=parseFloat(document.getElementById("monthly").value);

let R=parseFloat(document.getElementById("rate").value);

let Y=parseFloat(document.getElementById("years").value);

if(isNaN(P)||isNaN(R)||isNaN(Y)){
document.getElementById("result").innerHTML="Please enter all values.";
return;
}

let n=Y*12;
let r=R/100/12;

let maturity=P*((Math.pow(1+r,n)-1)/r)*(1+r);

let invested=P*n;
let interest=maturity-invested;

document.getElementById("result").innerHTML=
`
💰 Total Deposit<br>
₹ ${invested.toFixed(2)}<br><br>

📈 Interest Earned<br>
₹ ${interest.toFixed(2)}<br><br>

🏆 Maturity Amount<br>
₹ ${maturity.toFixed(2)}
`;

}

</script>

</body>
</html>
