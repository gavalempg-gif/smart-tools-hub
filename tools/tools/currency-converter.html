
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
padding:20px;
}
.container{
max-width:420px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}
h2{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}
input,select{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}
button{
width:100%;
padding:12px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
.result{
margin-top:20px;
padding:15px;
background:#f8fafc;
border-radius:8px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>💱 Currency Converter</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="from">
<option value="1">INR ₹</option>
<option value="86">USD $</option>
<option value="101">EUR €</option>
<option value="117">GBP £</option>
</select>

<select id="to">
<option value="1">INR ₹</option>
<option value="86">USD $</option>
<option value="101">EUR €</option>
<option value="117">GBP £</option>
</select>

<button onclick="convert()">Convert</button>

<div class="result" id="result"></div>

</div>

<script>

function convert(){

let amount=parseFloat(document.getElementById("amount").value);

let from=parseFloat(document.getElementById("from").value);

let to=parseFloat(document.getElementById("to").value);

if(isNaN(amount)){
document.getElementById("result").innerHTML="Please enter amount";
return;
}

let inr=amount*from;

let converted=inr/to;

document.getElementById("result").innerHTML=

"Converted Amount<br><br><h2>"+converted.toFixed(2)+"</h2>";

}

</script>

</body>
</html>
